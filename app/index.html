<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payout triage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a18;font-size:14px}
.wrap{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:20px;font-weight:500;margin-bottom:1.5rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.stat{background:#fff;border-radius:10px;padding:1rem;border:0.5px solid #e2e2de}
.stat-label{font-size:12px;color:#888780;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500;color:#1a1a18}
.stat-val.danger{color:#a32d2d}
.stat-val.warn{color:#854f0b}
.filters{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filters select,.filters input[type=text]{font-size:13px;padding:6px 10px;border:0.5px solid #c8c8c0;border-radius:8px;background:#fff;color:#1a1a18;outline:none}
.filters select:focus,.filters input[type=text]:focus{border-color:#888780}
.filters label.check{font-size:13px;color:#5f5e5a;display:flex;align-items:center;gap:6px;margin-left:auto;cursor:pointer}
.tbl-wrap{border:0.5px solid #e2e2de;border-radius:10px;overflow:hidden;background:#fff}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead th{background:#f5f5f3;padding:8px 10px;text-align:left;font-weight:500;font-size:12px;color:#888780;border-bottom:0.5px solid #e2e2de;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:#1a1a18}
tbody tr{border-bottom:0.5px solid #e2e2de}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f9f9f7}
tbody tr.resolved{opacity:0.4}
td{padding:8px 10px;color:#1a1a18;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500}
.badge.underpaid{background:#fcebeb;color:#a32d2d}
.badge.overpaid{background:#faeeda;color:#854f0b}
.badge.ok{background:#eaf3de;color:#3b6d11}
.conf-bar{height:4px;border-radius:2px;background:#e2e2de;width:56px;display:inline-block;vertical-align:middle;overflow:hidden}
.conf-fill{height:100%;border-radius:2px}
.resolve-btn{font-size:11px;padding:3px 8px;border:0.5px solid #c8c8c0;border-radius:8px;background:transparent;color:#5f5e5a;cursor:pointer}
.resolve-btn:hover{background:#f5f5f3}
.resolve-btn.done{color:#3b6d11;border-color:#c0dd97}
.empty{text-align:center;padding:2.5rem;color:#888780;font-size:13px}
.sort-arrow{margin-left:3px;opacity:0.4;font-size:10px}
</style>

<div class="wrap">
  <h1>Payout triage</h1>
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-label">Total logs</div><div class="stat-val" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Needs review</div><div class="stat-val danger" id="s-flagged">—</div></div>
    <div class="stat"><div class="stat-label">Underpaid · Overpaid</div><div class="stat-val warn" id="s-split">—</div></div>
    <div class="stat"><div class="stat-label">Amount at risk</div><div class="stat-val" id="s-risk">—</div></div>
  </div>
  <div class="filters">
    <select id="filter-status">
      <option value="all">All rows</option>
      <option value="review">Needs review</option>
      <option value="ok">Cleared</option>
    </select>
    <select id="filter-reason">
      <option value="all">All reasons</option>
      <option value="UNDERPAID">Underpaid</option>
      <option value="OVERPAID">Overpaid</option>
    </select>
    <input type="text" id="search" placeholder="Search worker or log ID…" style="width:200px">
    <label class="check"><input type="checkbox" id="hide-resolved"> Hide resolved</label>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr id="thead"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">No rows match the current filters.</div>
  </div>
</div>

<script>
var rows = [], resolved = new Set(), sortCol = null, sortDir = 1;

function fmt(p){ return '₹' + (p/100).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function absfmt(p){ return '₹' + (Math.abs(p)/100).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }

var COLS = [
  {key:'log_id',    label:'Log',         w:'70px'},
  {key:'worker_id', label:'Worker',      w:'80px'},
  {key:'expected_paise', label:'Expected', w:'105px',
    render:function(r){return fmt(r.expected_paise);}},
  {key:'paid_paise', label:'Paid',        w:'105px',
    render:function(r){return fmt(r.paid_paise);}},
  {key:'discrepancy_paise', label:'Discrepancy', w:'120px',
    render:function(r){
      if(r.discrepancy_paise===0) return '<span style="color:#888780">—</span>';
      var col = r.discrepancy_paise<0 ? '#a32d2d' : '#854f0b';
      var sign = r.discrepancy_paise<0 ? '−' : '+';
      return '<span style="color:'+col+'">'+sign+' '+absfmt(r.discrepancy_paise)+'</span>';
    }},
  {key:'review_reason', label:'Reason', w:'110px',
    render:function(r){
      if(!r.review_reason) return '<span class="badge ok">cleared</span>';
      var cls = r.review_reason==='UNDERPAID'?'underpaid':'overpaid';
      return '<span class="badge '+cls+'">'+r.review_reason.toLowerCase()+'</span>';
    }},
  {key:'confidence', label:'Confidence', w:'100px',
    render:function(r){
      var pct = Math.round(r.confidence*100);
      var col = pct===100 ? '#639922' : '#BA7517';
      return '<div style="display:flex;align-items:center;gap:6px"><div class="conf-bar"><div class="conf-fill" style="width:'+pct+'%;background:'+col+'"></div></div><span style="font-size:11px;color:#888780">'+pct+'%</span></div>';
    }},
  {key:'_action', label:'', w:'80px',
    render:function(r){
      if(!r.needs_manual_review) return '';
      var done = resolved.has(r.log_id);
      return '<button class="resolve-btn'+(done?' done':'')+'" onclick="toggleResolve(\''+r.log_id+'\')">'+(done?'✓ done':'resolve')+'</button>';
    }}
];

function toggleResolve(id){
  resolved.has(id) ? resolved.delete(id) : resolved.add(id);
  render();
}

function getFiltered(){
  var status = document.getElementById('filter-status').value;
  var reason = document.getElementById('filter-reason').value;
  var q = document.getElementById('search').value.toLowerCase();
  var hideRes = document.getElementById('hide-resolved').checked;
  return rows.filter(function(r){
    if(status==='review' && !r.needs_manual_review) return false;
    if(status==='ok' && r.needs_manual_review) return false;
    if(reason!=='all' && r.review_reason!==reason) return false;
    if(q && r.log_id.toLowerCase().indexOf(q)===-1 && r.worker_id.toLowerCase().indexOf(q)===-1) return false;
    if(hideRes && resolved.has(r.log_id)) return false;
    return true;
  });
}

function renderStats(){
  var flagged = rows.filter(function(r){return r.needs_manual_review;});
  var under = flagged.filter(function(r){return r.review_reason==='UNDERPAID';});
  var over  = flagged.filter(function(r){return r.review_reason==='OVERPAID';});
  var atRisk = flagged.reduce(function(s,r){return s+Math.abs(r.discrepancy_paise);},0);
  document.getElementById('s-total').textContent   = rows.length;
  document.getElementById('s-flagged').textContent = flagged.length;
  document.getElementById('s-split').textContent   = under.length + ' · ' + over.length;
  document.getElementById('s-risk').textContent    = fmt(atRisk);
}

function render(){
  renderStats();
  var filtered = getFiltered();
  if(sortCol){
    filtered.sort(function(a,b){
      var av=a[sortCol], bv=b[sortCol];
      if(typeof av==='string') return sortDir*(av<bv?-1:av>bv?1:0);
      return sortDir*(av-bv);
    });
  }
  document.getElementById('empty').style.display = filtered.length ? 'none' : 'block';
  document.getElementById('tbody').innerHTML = filtered.map(function(r){
    var isRes = resolved.has(r.log_id);
    return '<tr class="'+(isRes?'resolved':'')+'">'+COLS.map(function(c){
      return '<td>'+(c.render ? c.render(r) : (r[c.key]!==undefined?r[c.key]:''))+'</td>';
    }).join('')+'</tr>';
  }).join('');
}

function buildHead(){
  document.getElementById('thead').innerHTML = COLS.map(function(c){
    if(!c.key || c.key==='_action') return '<th style="width:'+c.w+'">'+c.label+'</th>';
    var arrow = sortCol===c.key ? (sortDir===1?' ↑':' ↓') : '';
    return '<th style="width:'+c.w+'" onclick="setSort(\''+c.key+'\')">'+c.label+'<span class="sort-arrow">'+arrow+'</span></th>';
  }).join('');
}

function setSort(col){
  if(sortCol===col) sortDir*=-1; else {sortCol=col; sortDir=1;}
  buildHead(); render();
}

['filter-status','filter-reason'].forEach(function(id){
  document.getElementById(id).addEventListener('change', render);
});
document.getElementById('search').addEventListener('input', render);
document.getElementById('hide-resolved').addEventListener('change', render);

buildHead();

fetch('../output.json').then(function(r){return r.json();}).then(function(data){
  rows = data; render();
}).catch(function(){
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#888780">'+
    'Could not load output.json — run <code>python -m reconciler reconcile</code> first, then serve with <code>python -m reconciler serve</code>.'+
    '</td></tr>';
});
</script>
</html>
